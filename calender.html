<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendar — ARE Strategic Communication</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --green-dark: #0d3d2b;
      --green-mid: #1a5c41;
      --green-vivid: #009A4D;
      --green-light: #d4ede0;
      --cream: #f7f5f0;
      --ink: #131310;
      --muted: #5a5a52;
      --gold: #c9a84c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100vh;
    }
    a { text-decoration: none; color: inherit; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 18px 50px;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 999;
      transition: background 0.4s ease, box-shadow 0.4s ease, padding 0.4s ease;
    }
    nav.scrolled {
      background: rgba(247,245,240,0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.08), 0 6px 24px rgba(0,0,0,0.06);
      padding: 12px 50px;
    }
    .logo img { height: 46px; object-fit: contain; }
    .nav-links { display: flex; gap: 36px; align-items: center; }
    .nav-links a {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem; color: var(--green-dark);
      letter-spacing: 0.02em; position: relative;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: -3px; left: 0;
      width: 0; height: 1px; background: var(--green-vivid);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-links a.active { color: var(--green-vivid); }
    .social-icons { display: flex; gap: 18px; }
    .social-icons a { font-size: 1rem; color: var(--green-dark); transition: color 0.2s, transform 0.2s; }
    .social-icons a:hover { color: var(--green-vivid); transform: translateY(-2px); }

    /* ── PAGE HERO ── */
    .page-hero {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
      padding: 140px 40px 90px;
      color: #fff;
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .page-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(0,154,77,0.2), transparent 60%);
    }
    .page-hero::after {
      content: '';
      position: absolute; bottom: -2px; left: 0;
      width: 100%; height: 70px;
      background: var(--cream);
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero-inner { position: relative; z-index: 1; }
    .eyebrow {
      display: inline-block;
      font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--green-light);
      border: 1px solid rgba(212,237,224,0.4);
      padding: 5px 14px; border-radius: 100px; margin-bottom: 16px;
    }
    .page-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 4vw, 3.6rem);
      font-weight: 700; line-height: 1.15;
    }
    .page-hero h1 em { font-style: italic; color: var(--green-light); }

    /* ── CALENDAR WRAPPER ── */
    .calendar-wrapper {
      max-width: 1100px;
      margin: 60px auto 80px;
      padding: 0 24px;
    }

    /* ── CONTROLS ── */
    .cal-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .cal-nav-btns { display: flex; gap: 10px; }
    .cal-nav-btns button {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1.5px solid rgba(13,61,43,0.2);
      background: #fff;
      color: var(--green-dark);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.25s;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-nav-btns button:hover { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }
    .cal-month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--green-dark);
      text-align: center;
      flex: 1;
    }
    .cal-month-label span { font-style: italic; color: var(--green-vivid); }

    .selectors { display: flex; gap: 10px; }
    .selectors select {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1.5px solid rgba(13,61,43,0.2);
      background: #fff;
      color: var(--green-dark);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      outline: none;
      transition: border-color 0.25s;
    }
    .selectors select:focus { border-color: var(--green-vivid); }

    /* ── VINE FRAME ── */
    .vine-frame {
      position: relative;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(13,61,43,0.10);
      padding: 36px 32px 40px;
      overflow: hidden;
    }

    /* SVG vine decorations */
    .vine-frame::before, .vine-frame::after {
      content: '';
      position: absolute;
      pointer-events: none;
      background-repeat: no-repeat;
      background-size: contain;
    }

    /* Inline SVG vines via data URIs */
    .vine-tl {
      position: absolute; top: 0; left: 0;
      width: 180px; height: 180px;
      pointer-events: none;
      opacity: 0.18;
    }
    .vine-br {
      position: absolute; bottom: 0; right: 0;
      width: 180px; height: 180px;
      pointer-events: none;
      opacity: 0.18;
      transform: rotate(180deg);
    }

    /* ── DAY NAMES ── */
    .day-names {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .day-name {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 0;
    }

    /* ── CALENDAR GRID ── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .day-cell {
      min-height: 96px;
      border-radius: 14px;
      padding: 10px 10px 8px;
      background: var(--cream);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1.5px solid transparent;
    }
    .day-cell:not(.inactive):hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(13,61,43,0.10);
      border-color: var(--green-light);
    }
    .day-cell.inactive {
      background: transparent;
      opacity: 0.35;
    }
    .day-cell.today {
      border-color: var(--gold);
      background: #fffaf0;
    }
    .day-cell.has-event {
      cursor: pointer;
      border-color: var(--green-vivid);
      background: #f0fbf5;
    }
    .day-cell.has-event:hover {
      background: #e6f7ee;
      box-shadow: 0 8px 28px rgba(0,154,77,0.18);
    }

    .date-num {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .day-cell.today .date-num {
      color: var(--gold);
    }
    .day-cell.inactive .date-num { color: var(--muted); }

    .event-pill {
      display: inline-block;
      background: var(--green-vivid);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 100px;
      line-height: 1.4;
      margin-top: 3px;
      letter-spacing: 0.01em;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* little vine leaf on event cells */
    .day-cell.has-event::after {
      content: '🌿';
      position: absolute;
      top: 6px; right: 8px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* ── EVENT BANNER / POPUP ── */
    .event-banner {
      position: fixed;
      bottom: 32px; right: 32px;
      width: 300px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(13,61,43,0.22);
      overflow: hidden;
      z-index: 9000;
      transform: translateY(20px) scale(0.96);
      opacity: 0;
      visibility: hidden;
      transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .event-banner.active {
      opacity: 1; visibility: visible;
      transform: translateY(0) scale(1);
    }
    .banner-poster {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }
    .banner-body { padding: 18px 18px 20px; }
    .banner-tag {
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--green-vivid); font-weight: 500; margin-bottom: 6px;
    }
    .banner-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--green-dark);
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .banner-date {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .banner-date i { color: var(--green-vivid); }
    .banner-btn {
      display: inline-block;
      background: var(--green-vivid);
      color: #fff;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .banner-btn:hover { background: var(--green-dark); }
    .banner-close {
      position: absolute;
      top: 10px; right: 12px;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(0,0,0,0.35);
      border: none;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .banner-close:hover { background: rgba(0,0,0,0.55); }

    /* ── LEGEND ── */
    .cal-legend {
      display: flex;
      gap: 20px;
      margin-top: 24px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.8rem; color: var(--muted);
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .legend-dot.event { background: var(--green-vivid); }
    .legend-dot.today { background: var(--gold); }

    /* ── FOOTER ── */
    footer {
      background: var(--green-dark);
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 40px 50px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 20px;
      color: rgba(255,255,255,0.6); font-size: 0.88rem;
    }
    footer .footer-logo img { height: 36px; filter: brightness(0) invert(1); opacity: 0.7; }
    footer .footer-links { display: flex; gap: 24px; }
    footer .footer-links a { color: rgba(255,255,255,0.6); transition: color 0.2s; }
    footer .footer-links a:hover { color: var(--green-vivid); }
    footer .footer-social { display: flex; gap: 16px; }
    footer .footer-social a { color: rgba(255,255,255,0.6); font-size: 1rem; transition: color 0.2s, transform 0.2s; }
    footer .footer-social a:hover { color: var(--green-vivid); transform: translateY(-2px); }

    @media (max-width: 700px) {
      nav { padding: 14px 24px; }
      nav.scrolled { padding: 10px 24px; }
      .nav-links { display: none; }
      .vine-frame { padding: 20px 12px 24px; }
      .day-cell { min-height: 70px; padding: 6px; }
      .event-banner { width: calc(100vw - 32px); right: 16px; bottom: 16px; }
      footer { flex-direction: column; text-align: center; align-items: center; }
      footer .footer-links { flex-wrap: wrap; justify-content: center; }
      .cal-month-label { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav id="navbar">
    <div class="logo"><img src="ARussell logo updated .png" alt="ARE Logo"></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="calender.html" class="active">Calendar</a>
      <a href="gallery.html">Gallery</a>
      <a href="Reservation.html">Reservations</a>
    </div>
    <div class="social-icons">
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="page-hero">
    <div class="hero-inner">
      <span class="eyebrow">Stay in the Loop</span>
      <h1>Events <em>Calendar</em></h1>
    </div>
  </section>

  <!-- CALENDAR -->
  <div class="calendar-wrapper">
    <div class="cal-controls">
      <div class="cal-nav-btns">
        <button onclick="shiftMonth(-1)" aria-label="Previous month"><i class="fas fa-chevron-left"></i></button>
        <button onclick="shiftMonth(1)" aria-label="Next month"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="cal-month-label" id="monthLabel">—</div>
      <div class="selectors">
        <select id="monthSelect" onchange="onSelectChange()"></select>
        <select id="yearSelect" onchange="onSelectChange()"></select>
      </div>
    </div>

    <div class="vine-frame">
      <!-- SVG Vine TL -->
      <svg class="vine-tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M10 190 Q30 120 80 80 Q130 40 190 10" stroke="#009A4D" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 190 Q20 150 50 140 Q30 130 25 110" stroke="#009A4D" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M80 80 Q65 65 60 45 Q55 55 40 50" stroke="#009A4D" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="24" cy="108" rx="10" ry="7" fill="#009A4D" transform="rotate(-40 24 108)"/>
        <ellipse cx="59" cy="44" rx="10" ry="7" fill="#009A4D" transform="rotate(-70 59 44)"/>
        <ellipse cx="85" cy="75" rx="9" ry="6" fill="#009A4D" transform="rotate(20 85 75)"/>
        <ellipse cx="135" cy="38" rx="9" ry="6" fill="#009A4D" transform="rotate(-50 135 38)"/>
        <circle cx="13" cy="187" r="4" fill="#009A4D"/>
        <circle cx="188" cy="13" r="3" fill="#009A4D"/>
      </svg>

      <!-- SVG Vine BR (rotated via CSS) -->
      <svg class="vine-br" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
        <path d="M10 190 Q30 120 80 80 Q130 40 190 10" stroke="#009A4D" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M10 190 Q20 150 50 140 Q30 130 25 110" stroke="#009A4D" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M80 80 Q65 65 60 45 Q55 55 40 50" stroke="#009A4D" stroke-width="1.5" stroke-linecap="round"/>
        <ellipse cx="24" cy="108" rx="10" ry="7" fill="#009A4D" transform="rotate(-40 24 108)"/>
        <ellipse cx="59" cy="44" rx="10" ry="7" fill="#009A4D" transform="rotate(-70 59 44)"/>
        <ellipse cx="85" cy="75" rx="9" ry="6" fill="#009A4D" transform="rotate(20 85 75)"/>
        <ellipse cx="135" cy="38" rx="9" ry="6" fill="#009A4D" transform="rotate(-50 135 38)"/>
        <circle cx="13" cy="187" r="4" fill="#009A4D"/>
        <circle cx="188" cy="13" r="3" fill="#009A4D"/>
      </svg>

      <div class="day-names" id="dayNames"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot event"></div> Event Day</div>
      <div class="legend-item"><div class="legend-dot today"></div> Today</div>
    </div>
  </div>

  <!-- EVENT BANNER -->
  <div class="event-banner" id="eventBanner">
    <button class="banner-close" onclick="closeBanner()" aria-label="Close"><i class="fas fa-times"></i></button>
    <img class="banner-poster" id="bannerPoster" src="" alt="Event Poster">
    <div class="banner-body">
      <div class="banner-tag" id="bannerTag"></div>
      <div class="banner-title" id="bannerTitle"></div>
      <div class="banner-date" id="bannerDate"></div>
      <a href="Reservation.html" class="banner-btn">Reserve a Spot</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo"><img src="ARussell logo updated .png" alt="ARE Logo"></div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="calender.html">Calendar</a>
      <a href="gallery.html">Gallery</a>
      <a href="Reservation.html">Reservations</a>
    </div>
    <div class="footer-social">
      <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
      <a href="#" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
      <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
    </div>
    <p style="width:100%; text-align:center; margin-top:10px;">&copy; 2025 ARE — Strategic Communication. All rights reserved.</p>
  </footer>

  <script>
    // ── EVENT DATA ──
    // For each date key: { name, tag, poster (image path), date label }
    const events = {
      "2025-09-06": {
        name: "4to Encuentro Comunicadoras NY",
        tag: "Event",
        poster: "pic.jpg",
        dateLabel: "September 6, 2025"
      },
      "2025-09-15": {
        name: "Latin Women Empowered: Faces",
        tag: "Community",
        poster: "FACES invite -English (1).jpg",
        dateLabel: "September 15, 2025"
      }
    };

    // ── STATE ──
    const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const today = new Date();
    let curMonth = today.getMonth();
    let curYear  = today.getFullYear();

    // ── SELECTORS ──
    const monthSel = document.getElementById('monthSelect');
    const yearSel  = document.getElementById('yearSelect');

    monthNames.forEach((m, i) => {
      const o = document.createElement('option');
      o.value = i; o.textContent = m;
      monthSel.appendChild(o);
    });

    const startYear = 2025;
    const endYear   = startYear + 5;
    for (let y = startYear; y <= endYear; y++) {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      yearSel.appendChild(o);
    }

    function syncSelectors() {
      monthSel.value = curMonth;
      yearSel.value  = curYear;
      document.getElementById('monthLabel').innerHTML =
        `${monthNames[curMonth]} <span>${curYear}</span>`;
    }

    function onSelectChange() {
      curMonth = parseInt(monthSel.value);
      curYear  = parseInt(yearSel.value);
      renderCalendar();
    }

    function shiftMonth(dir) {
      curMonth += dir;
      if (curMonth < 0)  { curMonth = 11; curYear--; }
      if (curMonth > 11) { curMonth = 0;  curYear++; }
      // clamp to range
      if (curYear < startYear) { curYear = startYear; curMonth = 0; }
      if (curYear > endYear)   { curYear = endYear; curMonth = 11; }
      renderCalendar();
    }

    // ── RENDER ──
    function renderCalendar() {
      syncSelectors();
      const grid = document.getElementById('calGrid');
      const dayNamesEl = document.getElementById('dayNames');
      grid.innerHTML = '';
      dayNamesEl.innerHTML = '';

      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-name';
        el.textContent = d;
        dayNamesEl.appendChild(el);
      });

      const firstDay   = new Date(curYear, curMonth, 1).getDay();
      const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
      const prevDays   = new Date(curYear, curMonth, 0).getDate();

      // Leading blanks
      for (let i = firstDay - 1; i >= 0; i--) {
        const cell = document.createElement('div');
        cell.className = 'day-cell inactive';
        cell.innerHTML = `<div class="date-num">${prevDays - i}</div>`;
        grid.appendChild(cell);
      }

      // Active days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateKey = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const ev = events[dateKey];
        const cell = document.createElement('div');
        cell.className = 'day-cell';

        const isToday = day === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear();
        if (isToday)  cell.classList.add('today');
        if (ev)       cell.classList.add('has-event');

        let inner = `<div class="date-num">${day}</div>`;
        if (ev) {
          inner += `<div class="event-pill">${ev.name}</div>`;
          cell.addEventListener('click', () => openBanner(ev));
        }
        cell.innerHTML = inner;
        grid.appendChild(cell);
      }

      // Trailing blanks
      const total = firstDay + daysInMonth;
      const trailing = (7 - (total % 7)) % 7;
      for (let i = 1; i <= trailing; i++) {
        const cell = document.createElement('div');
        cell.className = 'day-cell inactive';
        cell.innerHTML = `<div class="date-num">${i}</div>`;
        grid.appendChild(cell);
      }
    }

    // ── BANNER ──
    function openBanner(ev) {
      document.getElementById('bannerPoster').src   = ev.poster;
      document.getElementById('bannerTag').textContent   = ev.tag;
      document.getElementById('bannerTitle').textContent = ev.name;
      document.getElementById('bannerDate').innerHTML =
        `<i class="fas fa-calendar-day"></i> ${ev.dateLabel}`;
      document.getElementById('eventBanner').classList.add('active');
    }

    function closeBanner() {
      document.getElementById('eventBanner').classList.remove('active');
    }

    // ── NAVBAR ──
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 60);
    });

    // ── INIT ──
    renderCalendar();
  </script>
</body>
</html>
